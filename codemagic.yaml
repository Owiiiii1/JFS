workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      # Требует настройки в Codemagic UI: App Store Connect API key + сертификаты/профили
      # Team settings → Integrations → Developer Portal
      # Team settings → Code signing identities (Distribution cert + App Store profile)
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.youngfashionshow.yfs
    scripts:
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Check localization encoding
        script: powershell -ExecutionPolicy Bypass -File scripts/check_mojibake.ps1
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist="$HOME/export_options.plist"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
